name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fotobuch-linux-x86_64
            binary: fotobuch
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fotobuch-windows-x86_64
            binary: fotobuch.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cmake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test
        shell: bash
        run: ./target/${{ matrix.target }}/release/${{ matrix.binary }} --version

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/fotobuch fotobuch
          tar -czf ${{ matrix.artifact }}.tar.gz fotobuch
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\fotobuch.exe" "fotobuch.exe"
          Compress-Archive -Path fotobuch.exe -DestinationPath "${{ matrix.artifact }}.zip"
          $hash = (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash
          "$hash  ${{ matrix.artifact }}.zip" | Out-File "${{ matrix.artifact }}.zip.sha256" -Encoding ascii

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    name: Create Release Draft
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate release notes
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release draft
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: true
          files: artifacts/**/*
